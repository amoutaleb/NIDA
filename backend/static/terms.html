<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NiDa — Terms &amp; Attributions</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  :root{--panel:rgba(21,21,38,.97);--txt:#f0f0f5;--accent:#4caf82}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#12121e;color:var(--txt);
    line-height:1.6;min-height:100vh}
  .topbar{background:var(--panel);padding:10px 18px;display:flex;align-items:center;gap:12px;
    flex-wrap:wrap;position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(0,0,0,.4)}
  .topbar h1{font-size:1rem;font-weight:600}
  .langs{display:flex;gap:4px;margin-inline-start:auto}
  .langs button{background:transparent;border:1px solid rgba(255,255,255,.25);color:var(--txt);
    border-radius:6px;padding:3px 9px;cursor:pointer;font-size:.75rem}
  .langs button.active{background:#fff;color:#12121e;font-weight:700}
  .backbtn{background:transparent;border:1px solid rgba(255,255,255,.25);color:var(--txt);
    border-radius:6px;padding:3px 10px;cursor:pointer;font-size:.75rem;text-decoration:none}
  .wrap{max-width:860px;margin:0 auto;padding:26px 20px 60px}
  h2{font-size:1.25rem;margin:26px 0 10px;color:#fff}
  h3{font-size:1rem;margin:18px 0 6px;color:var(--accent)}
  p{margin:8px 0;opacity:.92}
  a{color:#7db8ff}
  table{width:100%;border-collapse:collapse;margin:12px 0;font-size:.85rem}
  th,td{border:1px solid rgba(255,255,255,.14);padding:8px 10px;text-align:start;vertical-align:top}
  th{background:rgba(255,255,255,.06);font-weight:600}
  .lic{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);
    border-radius:10px;padding:16px 18px;margin:12px 0}
  .lic ul{margin:8px 0;padding-inline-start:22px}
  .lic li{margin:4px 0}
  .note{opacity:.7;font-size:.85rem;margin-top:8px}
  footer{opacity:.6;font-size:.8rem;margin-top:34px;border-top:1px solid rgba(255,255,255,.12);padding-top:14px}
</style>
</head>
<body>
<div class="topbar">
  <span style="font-size:1.1rem"><i class="fa-solid fa-scale-balanced"></i></span>
  <h1 data-i18n="title">NiDa — Terms &amp; Attributions</h1>
  <div class="langs">
    <button data-lang="en">EN</button><button data-lang="fr">FR</button><button data-lang="ar">ع</button>
  </div>
  <a class="backbtn" href="/map"><i class="fa-solid fa-arrow-left"></i> <span data-i18n="back">Live map</span></a>
</div>
<div class="wrap" id="content"></div>

<script>

let LANG = localStorage.getItem('nida_lang') || 'en';
function apply(){
  const d = I18N[LANG] || I18N.en;
  document.documentElement.lang = LANG;
  document.body.dir = (LANG === 'ar') ? 'rtl' : 'ltr';
  document.getElementById('content').innerHTML = d.html;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.dataset.i18n;
    if (d[k]) el.textContent = d[k];
  });
  document.querySelectorAll('.langs button').forEach(b =>
    b.classList.toggle('active', b.dataset.lang === LANG));
}
document.querySelectorAll('.langs button').forEach(b => b.onclick = () => {
  LANG = b.dataset.lang; localStorage.setItem('nida_lang', LANG); apply();
});
apply();
</script>
</body>
</html>
